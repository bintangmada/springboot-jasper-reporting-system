services:
  db:
    image: mysql:8.0
    container_name: jasper-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: jasper_reporting_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: jasper-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/jasper_reporting_db?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
